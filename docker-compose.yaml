version: "3.9"
services:
  nginx:
    image: "nginx:1.29-alpine"
    depends_on:
      - php
    volumes:
      - wordpress_data:/var/www/html
      - type: bind
        source: ./nginx/nginx.conf
        target: /etc/nginx/nginx.conf
        read_only: true
      - type: bind
        source: ./nginx/default.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
      - "nginx_cache:/var/cache/nginx"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
  php:
    # image: "wordpress:php8.5-fpm-alpine"
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    depends_on:
      - db
      - redis
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:?wordpress}
      WORDPRESS_DB_USER: ${SERVICE_USER_DB:?}
      WORDPRESS_DB_PASSWORD: ${SERVICE_PASSWORD_DB:?}
      WP_REDIS_HOST: redis
      WP_REDIS_PORT: 6379
      WP_REDIS_DATABASE: 0
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_REDIS_HOST', getenv('WP_REDIS_HOST') ?: 'redis');
        define('WP_REDIS_PORT', getenv('WP_REDIS_PORT') ?: 6379);
        define('WP_REDIS_DATABASE', getenv('WP_REDIS_DATABASE') ?: 0);
    volumes:
      - wordpress_data:/var/www/html
      - type: bind
        source: ./php/php.ini
        target: /usr/local/etc/php/conf.d/zzz-custom.ini
        is_directory: false
        content: |
          memory_limit=1G
          max_execution_time=3600
          upload_max_filesize=1G
          post_max_size=1G
          max_input_time=3600
          max_input_vars=10000

          opcache.enable=1
          opcache.memory_consumption=256
          opcache.max_accelerated_files=100000
          opcache.validate_timestamps=0
          opcache.revalidate_freq=0

          opcache.jit=0
          opcache.jit_buffer_size=0
      - backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/9000'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
  db:
    image: "mariadb:12"
    environment:
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME}
      MYSQL_USER: ${SERVICE_USER_DB:?}
      MYSQL_PASSWORD: ${SERVICE_PASSWORD_DB:?}
      MYSQL_ROOT_PASSWORD: ${SERVICE_PASSWORD_ROOTDB:?}
    volumes:
      - "db_data:/var/lib/mysql"
    command:
      - "--innodb-buffer-pool-size=4G"
      - "--innodb-flush-log-at-trx-commit=2"
      - "--innodb-log-file-size=256M"
      - "--innodb-log-buffer-size=16M"
      - "--query-cache-size=64M"
      - "--query-cache-type=1"
      - "--max-connections=200"
      - "--innodb-thread-concurrency=16"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
  redis:
    image: "redis:8-alpine"
    volumes:
      - "redis_data:/data"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
  backup:
    build:
      context: ./docker/backup
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:?wordpress}
      WORDPRESS_DB_USER: ${SERVICE_USER_DB:?}
      WORDPRESS_DB_PASSWORD: ${SERVICE_PASSWORD_DB:?}
    volumes:
      - wordpress_data:/var/www/html
      - backups:/backups
    command: ["crond", "-f", "-L", "/dev/stdout"]
    healthcheck:
      test: ["CMD-SHELL", "[ -d /backups ] && echo ok || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
volumes:
  db_data: null
  nginx_cache: null
  redis_data: null
  wordpress_data: null
  backups: null
